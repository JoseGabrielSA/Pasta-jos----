<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biostudy - Formulário</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #F5F5E8;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .topo {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100px;
      background-color: #7D9474;
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      font-size: 33px;
    }
    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h1 {
      text-align: center;
      margin: 10px 0 20px;
      color: black;
      font-size: 25px;
    }

    h3{
      font-size: 14px;
      text-align: center;
    }

    span{
      font-size: 10px;
      color: red;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .row { display: flex; gap: 10px; }
    .row input { width: 50%; }
    .error {
      color: red;
      font-size: 12px;
      display: none;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #7D9474;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="topo">BIOSTUDY</div>
  <div class="container">
    <h1>Informe seus dados</h1>
    <h3>Complete suas informações para prosseguir</h3>

    <form id="form">
      <input type="text" id="nome" placeholder="Nome completo" class="inputs required" oninput="nameValidate()">
      <span class="span">Mínimo 8 caracteres</span>

      <input  type="text" placeholder="Digite seu email" class="inputs required" oninput="emailValidate()" >
      <span class="span">Digite um email válido</span>

      <input type="date" id="nasc">

      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
      <span>CPF invalido</span>

      <input type="tel" id="celular" placeholder="(99)99999-9999" maxlength="15">

      <button type="submit">prosseguir</button>
    </form>
  </div>
  <script>
    const form   = document.getElementById('form');
    const campos = document.querySelectorAll('.required');
    const spans  = document.querySelectorAll('span');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setError(index) {
        campos[index].style.border = '2px solid #e63636';
        spans[index].style.display = 'block';
    }

    function setSuccess(index) {
        campos[index].style.border = '2px solid green';
        spans[index].style.display = 'none';
    }

    function emailValidate(){
      if(emailRegex.test(campos[1].value)) {
            setSuccess(1);
      } else {
            setError(1);
      }
    }

    function nameValidate() {
        if(campos[0].value.length < 8){
            setSuccess(0);
        } else {
            setError(0);
        }
    }

    const cpfInput = document.getElementById('cpf');
    const celularInput = document.getElementById('celular');

    // Máscara simples para CPF
    cpfInput.addEventListener('input', () => {
      let value = cpfInput.value.replace(/\D/g, '');
      if (value.length > 3) value = value.slice(0, 3) + '.' + value.slice(3);
      if (value.length > 7) value = value.slice(0, 7) + '.' + value.slice(7);
      if (value.length > 11) value = value.slice(0, 11) + '-' + value.slice(11, 13);
      cpfInput.value = value.slice(0, 14);
    });

    // Valida CPF (formato e dígitos verificadores)
      function validarCPF(cpf) {
      cpf = cpf.replace(/[^\d]+/g, '');
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

      let soma = 0;
      for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
      let digito1 = 11 - (soma % 11);
      if (digito1 > 9) digito1 = 0;
      if (digito1 !== parseInt(cpf[9])) return false;

      soma = 0;
      for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
      let digito2 = 11 - (soma % 11);
      if (digito2 > 9) digito2 = 0;

      return digito2 === parseInt(cpf[10]);
    }

    function cpfValidate() {
      const spanCPF = cpfInput.nextElementSibling;
      if (validarCPF(cpfInput.value)) {
        cpfInput.style.border = '2px solid green';
        spanCPF.style.display = 'none';
      } else {
        cpfInput.style.border = '2px solid #e63636';
        spanCPF.style.display = 'block';
      }
    }

    cpfInput.addEventListener('input', cpfValidate);

     form.addEventListener('submit', (event) => {
      nameValidate();
      emailValidate();
      cpfValidate();

      const erroVisivel = Array.from(document.querySelectorAll('span'))
                            .some(span => span.style.display === 'block');
      if (erroVisivel) {
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
