<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--bootrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
  <title>Formulário CEP</title>
  <style>
 .topo,body{display:flex}.topo,button{background-color:#7d9474}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background-color:#f5f5e8;justify-content:center;align-items:center;height:100vh}.topo,h2{font-family:Cambria,Cochin,Georgia,Times,'Times New Roman',serif}.topo{position:absolute;top:0;width:100%;height:90px;justify-content:center;align-items:center;color:#000;font-size:33px}.container{background-color:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1);width:500px;margin-top:100px}h2{margin:6px 0 40px;font-size:20px;text-align:center}input{width:95%;padding:8px;margin-bottom:10px;border:1px solid #ccc;border-radius:5px}button{width:49%;padding:10px;color:#fff;border:none;border-radius:5px;cursor:pointer;margin:10px}
  </style>
</head>
<body>

<div class="topo">BIOSTUDY</div>

<div class="container">
  <h2>Endereço</h2>

  <label>CEP</label>
  <input type="text" id="cep" maxlength="8">

  <label>Rua</label>
  <input type="text" id="logradouro">

  <label>Número</label>
  <input type="number" id="numero">

  <label>Bairro</label>
  <input type="text" id="bairro">

  <label>Cidade</label>
  <input type="text" id="localidade">

  <label>Estado</label>
  <input type="text" id="uf">

  <center>
  <a target="_blank" href="site.jarlison.html">
  <button type="submit">Enviar</button>
  </a>
  </center>
</div>

<script>
  document.getElementById("cep").addEventListener("keyup", function () {
    const cep = this.value.replace(/\D/g, '');

    if (cep.length === 8) {
      fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(data => {
          if (!data.erro) {
            document.getElementById("logradouro").value = data.logradouro;
            document.getElementById("bairro").value = data.bairro;
            document.getElementById("localidade").value = data.localidade;
            document.getElementById("uf").value = data.uf;
          } else {
            alert("CEP não encontrado.");
          }
        })
        .catch(error => {
          console.error("Erro ao buscar o CEP:", error);
        });
    }
  });
</script>



</body>
</html>
